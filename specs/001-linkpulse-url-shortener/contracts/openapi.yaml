openapi: 3.1.0
info:
  title: LinkPulse API
  version: 0.1.0
  description: REST API contract for LinkPulse URL shortening, authentication, link management, redirects, analytics, dashboard, and account profile workflows.
servers:
  - url: http://localhost:4000
    description: Local development API
tags:
  - name: Health
  - name: Authentication
  - name: Links
  - name: Redirects
  - name: Analytics
  - name: Dashboard
  - name: Profile
paths:
  /health:
    get:
      tags: [Health]
      summary: Check application health
      responses:
        "200":
          description: Application is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/auth/login:
    post:
      tags: [Authentication]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /api/auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh an access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Session refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /api/auth/logout:
    post:
      tags: [Authentication]
      summary: Revoke a refresh session
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Logout successful
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /api/links:
    get:
      tags: [Links]
      summary: List owned links
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Status"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated links
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    post:
      tags: [Links]
      summary: Create a short link
      description: Authentication is optional. Authenticated users own the created link.
      security:
        - bearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLinkRequest"
      responses:
        "201":
          description: Link created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "429":
          $ref: "#/components/responses/RateLimitError"
  /api/links/{shortCode}:
    get:
      tags: [Links]
      summary: Get public link details
      parameters:
        - $ref: "#/components/parameters/ShortCode"
      responses:
        "200":
          description: Link details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"
    patch:
      tags: [Links]
      summary: Update an owned link
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ShortCode"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLinkRequest"
      responses:
        "200":
          description: Link updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
    delete:
      tags: [Links]
      summary: Delete an owned link
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ShortCode"
      responses:
        "204":
          description: Link deleted
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/links/{shortCode}/analytics:
    get:
      tags: [Analytics]
      summary: Get analytics for an owned link
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ShortCode"
        - $ref: "#/components/parameters/FromDate"
        - $ref: "#/components/parameters/ToDate"
      responses:
        "200":
          description: Link analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/links/{shortCode}/qr:
    get:
      tags: [Links]
      summary: Generate a QR code for an owned link
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ShortCode"
        - name: format
          in: query
          schema:
            type: string
            enum: [png, svg]
            default: png
      responses:
        "200":
          description: QR code generated
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/svg+xml:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/dashboard/stats:
    get:
      tags: [Dashboard]
      summary: Get authenticated dashboard summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStatsResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /api/profile:
    get:
      tags: [Profile]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /{shortCode}:
    get:
      tags: [Redirects]
      summary: Redirect a short code to its destination
      parameters:
        - $ref: "#/components/parameters/ShortCode"
      responses:
        "302":
          description: Redirect to original URL
          headers:
            Location:
              schema:
                type: string
                format: uri
        "404":
          $ref: "#/components/responses/NotFoundError"
        "410":
          description: Link expired, deleted, or unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimitError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ShortCode:
      name: shortCode
      in: path
      required: true
      schema:
        type: string
        minLength: 3
        maxLength: 64
        pattern: "^[A-Za-z0-9_-]+$"
    Search:
      name: search
      in: query
      schema:
        type: string
        maxLength: 200
    Status:
      name: status
      in: query
      schema:
        type: string
        enum: [active, disabled, deleted, expired]
    Sort:
      name: sort
      in: query
      schema:
        type: string
        enum: [createdAt, clicks, expiresAt]
        default: createdAt
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    FromDate:
      name: from
      in: query
      schema:
        type: string
        format: date-time
    ToDate:
      name: to
      in: query
      schema:
        type: string
        format: date-time
  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnauthorizedError:
      description: Authentication required or invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ForbiddenError:
      description: Authenticated user cannot access this resource
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ConflictError:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimitError:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    StandardMeta:
      type: object
      properties:
        requestId:
          type: string
        timestamp:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
        meta:
          $ref: "#/components/schemas/StandardMeta"
    HealthResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required: [status]
          properties:
            status:
              type: string
              enum: [ok]
            database:
              type: string
              enum: [ok, degraded]
            cache:
              type: string
              enum: [ok, degraded]
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
    AuthResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required: [user, accessToken, refreshToken]
          properties:
            user:
              $ref: "#/components/schemas/UserPublic"
            accessToken:
              type: string
            refreshToken:
              type: string
    UserPublic:
      type: object
      required: [id, name, email, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
    CreateLinkRequest:
      type: object
      required: [originalUrl]
      properties:
        originalUrl:
          type: string
          format: uri
        customAlias:
          type: string
          minLength: 3
          maxLength: 64
          pattern: "^[A-Za-z0-9_-]+$"
        expiresAt:
          type: string
          format: date-time
    UpdateLinkRequest:
      type: object
      properties:
        originalUrl:
          type: string
          format: uri
        customAlias:
          type: string
          minLength: 3
          maxLength: 64
          pattern: "^[A-Za-z0-9_-]+$"
        expiresAt:
          type: string
          format: date-time
          nullable: true
        enabled:
          type: boolean
    Link:
      type: object
      required: [id, originalUrl, shortCode, shortUrl, status, clicks, createdAt]
      properties:
        id:
          type: string
        originalUrl:
          type: string
          format: uri
        shortCode:
          type: string
        customAlias:
          type: string
          nullable: true
        shortUrl:
          type: string
          format: uri
        status:
          type: string
          enum: [active, disabled, deleted, expired]
        clicks:
          type: integer
          minimum: 0
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    LinkResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/Link"
    LinkListResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required: [items, pagination]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Link"
            pagination:
              $ref: "#/components/schemas/Pagination"
    Pagination:
      type: object
      required: [page, pageSize, total, totalPages]
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
    AnalyticsResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required: [totalClicks, uniqueVisitors, dailyClicks, browsers, operatingSystems, devices, referrers, countries]
          properties:
            totalClicks:
              type: integer
            uniqueVisitors:
              type: integer
            dailyClicks:
              type: array
              items:
                $ref: "#/components/schemas/MetricPoint"
            browsers:
              type: array
              items:
                $ref: "#/components/schemas/MetricPoint"
            operatingSystems:
              type: array
              items:
                $ref: "#/components/schemas/MetricPoint"
            devices:
              type: array
              items:
                $ref: "#/components/schemas/MetricPoint"
            referrers:
              type: array
              items:
                $ref: "#/components/schemas/MetricPoint"
            countries:
              type: array
              items:
                $ref: "#/components/schemas/MetricPoint"
    MetricPoint:
      type: object
      required: [label, value]
      properties:
        label:
          type: string
        value:
          type: integer
    DashboardStatsResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required: [totalLinks, activeLinks, totalClicks, topLinks]
          properties:
            totalLinks:
              type: integer
            activeLinks:
              type: integer
            totalClicks:
              type: integer
            topLinks:
              type: array
              items:
                $ref: "#/components/schemas/Link"
    ProfileResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: "#/components/schemas/UserPublic"
