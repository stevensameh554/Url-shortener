openapi: 3.1.0
info:
  title: LinkPulse API
  version: 0.1.0
  description: REST API contract matching the current LinkPulse Express implementation.
servers:
  - url: http://localhost:4000
tags:
  - name: Health
  - name: Authentication
  - name: Profile
  - name: Links
  - name: Analytics
  - name: Redirects
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Check API process health
      responses:
        "200":
          description: API is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/ready:
    get:
      tags: [Health]
      summary: Check API dependency readiness
      responses:
        "200":
          description: Dependencies are ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: One or more dependencies are degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /api/auth/register:
    post:
      tags: [Authentication]
      summary: Register a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/auth/login:
    post:
      tags: [Authentication]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /api/auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh an access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /api/auth/logout:
    post:
      tags: [Authentication]
      summary: Revoke a refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "204":
          description: Logged out
        "400":
          $ref: "#/components/responses/ValidationError"
  /api/profile:
    get:
      tags: [Profile]
      summary: Get current profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileEnvelope"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /api/links:
    post:
      tags: [Links]
      summary: Create a short link
      description: Authentication is optional; authenticated users own created links.
      security:
        - bearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLinkRequest"
      responses:
        "201":
          description: Link created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkEnvelope"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"
    get:
      tags: [Links]
      summary: List owned links
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Status"
        - $ref: "#/components/parameters/Sort"
        - $ref: "#/components/parameters/Direction"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Owned links
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkListEnvelope"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /api/shorten:
    post:
      tags: [Links]
      summary: Compatibility alias for creating a short link
      security:
        - bearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLinkRequest"
      responses:
        "201":
          description: Link created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkEnvelope"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/links/{shortCode}:
    get:
      tags: [Links]
      summary: Get public link details
      parameters:
        - $ref: "#/components/parameters/ShortCode"
      responses:
        "200":
          description: Link details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkEnvelope"
        "404":
          $ref: "#/components/responses/NotFoundError"
    patch:
      tags: [Links]
      summary: Update an owned link
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ShortCode"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLinkRequest"
      responses:
        "200":
          description: Link updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkEnvelope"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
    delete:
      tags: [Links]
      summary: Soft-delete an owned link
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ShortCode"
      responses:
        "204":
          description: Link deleted
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/links/{shortCode}/qr:
    get:
      tags: [Links]
      summary: Generate QR code data URL for an owned link
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ShortCode"
      responses:
        "200":
          description: QR code payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QrEnvelope"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/links/{shortCode}/analytics:
    get:
      tags: [Analytics]
      summary: Get analytics for an owned link
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ShortCode"
        - $ref: "#/components/parameters/StartDate"
        - $ref: "#/components/parameters/EndDate"
      responses:
        "200":
          description: Link analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsEnvelope"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /{shortCode}:
    get:
      tags: [Redirects]
      summary: Redirect to the original URL
      parameters:
        - $ref: "#/components/parameters/ShortCode"
      responses:
        "302":
          description: Redirect
          headers:
            Location:
              schema:
                type: string
                format: uri
        "404":
          $ref: "#/components/responses/NotFoundError"
        "410":
          description: Link expired, disabled, or unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ShortCode:
      name: shortCode
      in: path
      required: true
      schema:
        type: string
        minLength: 3
        maxLength: 64
        pattern: "^[A-Za-z0-9_-]+$"
    Search:
      name: search
      in: query
      schema:
        type: string
    Status:
      name: status
      in: query
      schema:
        type: string
        enum: [active, disabled, deleted]
    Sort:
      name: sort
      in: query
      schema:
        type: string
        enum: [createdAt, clickCount, expiresAt]
    Direction:
      name: direction
      in: query
      schema:
        type: string
        enum: [asc, desc]
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    StartDate:
      name: start
      in: query
      schema:
        type: string
        format: date-time
    EndDate:
      name: end
      in: query
      schema:
        type: string
        format: date-time
  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    UnauthorizedError:
      description: Authentication required or invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ConflictError:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    ReadinessResponse:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ready, degraded]
        checks:
          type: object
          required: [postgres, redis]
          properties:
            postgres:
              type: string
              enum: [ok, down]
            redis:
              type: string
              enum: [ok, down]
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message]
          properties:
            message:
              type: string
            details: {}
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 80
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          minLength: 20
    AuthUser:
      type: object
      required: [sub, email, name]
      properties:
        sub:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
    AuthEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [user, accessToken, refreshToken, expiresAt]
          properties:
            user:
              $ref: "#/components/schemas/AuthUser"
            accessToken:
              type: string
            refreshToken:
              type: string
            expiresAt:
              type: string
              format: date-time
    Profile:
      type: object
      required: [id, name, email, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
    ProfileEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Profile"
    CreateLinkRequest:
      type: object
      required: [originalUrl]
      properties:
        originalUrl:
          type: string
          format: uri
        customAlias:
          type: string
          minLength: 3
          maxLength: 32
          pattern: "^[A-Za-z0-9_-]+$"
        expiresAt:
          type: string
          format: date-time
    UpdateLinkRequest:
      type: object
      properties:
        originalUrl:
          type: string
          format: uri
        customAlias:
          type:
            - string
            - "null"
          minLength: 3
          maxLength: 32
        status:
          type: string
          enum: [active, disabled]
        expiresAt:
          type:
            - string
            - "null"
          format: date-time
    Link:
      type: object
      required: [id, originalUrl, shortCode, status, shortUrl, clickCount, createdAt, updatedAt]
      properties:
        id:
          type: string
        originalUrl:
          type: string
          format: uri
        shortCode:
          type: string
        customAlias:
          type:
            - string
            - "null"
        status:
          type: string
          enum: [active, disabled, deleted]
        shortUrl:
          type: string
          format: uri
        clickCount:
          type: integer
          minimum: 0
        expiresAt:
          type:
            - string
            - "null"
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    LinkEnvelope:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Link"
    LinkListEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [items, page, pageSize, total]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Link"
            page:
              type: integer
            pageSize:
              type: integer
            total:
              type: integer
    QrEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [shortUrl, dataUrl]
          properties:
            shortUrl:
              type: string
              format: uri
            dataUrl:
              type: string
    AnalyticsEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [link, totalClicks, uniqueVisitors, daily, browsers, operatingSystems, devices, referrers, countries, events]
          properties:
            link:
              type: object
              required: [shortCode, originalUrl, clickCount]
              properties:
                shortCode:
                  type: string
                originalUrl:
                  type: string
                  format: uri
                clickCount:
                  type: integer
            totalClicks:
              type: integer
            uniqueVisitors:
              type: integer
            daily:
              type: object
              additionalProperties:
                type: integer
            browsers:
              type: object
              additionalProperties:
                type: integer
            operatingSystems:
              type: object
              additionalProperties:
                type: integer
            devices:
              type: object
              additionalProperties:
                type: integer
            referrers:
              type: object
              additionalProperties:
                type: integer
            countries:
              type: object
              additionalProperties:
                type: integer
            events:
              type: array
              items:
                type: object
                additionalProperties: true
