name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: linkpulse
          POSTGRES_PASSWORD: linkpulse
          POSTGRES_DB: linkpulse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U linkpulse -d linkpulse_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://linkpulse:linkpulse@localhost:5432/linkpulse_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: test-access-secret-that-is-long-enough
      JWT_REFRESH_SECRET: test-refresh-secret-that-is-long-enough
      APP_BASE_URL: http://localhost:4000
      WEB_ORIGIN: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:deploy
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - run: docker compose build
