services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: linkpulse
      POSTGRES_PASSWORD: linkpulse
      POSTGRES_DB: linkpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkpulse -d linkpulse"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: sh -c "npm --workspace apps/api run db:deploy && npm --workspace apps/api start"
    environment:
      NODE_ENV: production
      PORT: 4000
      APP_BASE_URL: http://localhost:4000
      WEB_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://linkpulse:linkpulse@postgres:5432/linkpulse?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: replace-with-a-long-random-access-secret
      JWT_REFRESH_SECRET: replace-with-a-long-random-refresh-secret
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL_DAYS: 7
      BCRYPT_ROUNDS: 12
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 120
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  postgres_data:
